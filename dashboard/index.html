<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DeployNOPE Dashboard</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0d1117;
    color: #c9d1d9;
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    min-height: 100vh;
  }

  /* ── Header ── */
  .header {
    background: #161b22;
    border-bottom: 1px solid #30363d;
    padding: 0.75rem 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .header h1 {
    font-size: 1.1rem;
    color: #f0f6fc;
    font-weight: 600;
  }
  .header h1 span { color: #f85149; }
  .header-status {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    font-size: 0.8rem;
    color: #8b949e;
  }
  .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #3fb950;
    animation: pulse 2s ease-in-out infinite;
  }
  .status-dot.warning { background: #d29922; }
  .status-dot.disconnected { background: #484f58; animation: none; }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .container {
    max-width: 1400px;
    margin: 0 auto;
    padding: 1rem 2rem;
  }

  /* ── Warnings Banner ── */
  .warnings-banner {
    background: rgba(248, 81, 73, 0.1);
    border: 1px solid rgba(248, 81, 73, 0.3);
    border-radius: 0;
    padding: 0.6rem 1rem;
    margin-bottom: 1rem;
    display: flex;
    align-items: center;
    gap: 0.6rem;
  }
  .warnings-banner .text {
    font-size: 0.8rem;
    color: #f85149;
    font-weight: 500;
  }
  .warnings-banner .detail {
    font-size: 0.75rem;
    color: #8b949e;
    margin-left: auto;
  }

  /* ── Staging Claim ── */
  .staging-bar {
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 0;
    padding: 0.6rem 1rem;
    margin-bottom: 1rem;
    display: flex;
    align-items: center;
    gap: 0.75rem;
    font-size: 0.8rem;
  }
  .staging-bar.claimed { border-color: rgba(210, 153, 34, 0.4); }
  .staging-bar.free { border-color: rgba(63, 185, 80, 0.3); }
  .staging-label {
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: #8b949e;
    white-space: nowrap;
  }
  .staging-status { font-weight: 500; }
  .staging-status.claimed { color: #d29922; }
  .staging-status.free { color: #3fb950; }

  /* ── Main Grid ── */
  .main-grid {
    display: grid;
    grid-template-columns: 1fr 320px;
    gap: 1rem;
  }

  /* ── Section Headers ── */
  .agents-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 0.75rem;
    margin-top: 1.25rem;
  }
  .agents-section h2,
  .activity-section h2 {
    font-size: 0.75rem;
    color: #8b949e;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .activity-section h2 {
    margin-bottom: 0.75rem;
  }

  /* ── Agent Cards ── */
  .agent-cards {
    display: flex;
    flex-direction: column;
    gap: 0.75rem;
  }
  .agent-card {
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 0;
    padding: 0.85rem 1rem;
  }
  .agent-card.stale { opacity: 0.5; }

  .agent-header {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    margin-bottom: 0.25rem;
  }
  .agent-meta-row {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    margin-bottom: 0.4rem;
    flex-wrap: wrap;
  }
  .agent-name {
    font-size: 0.75rem;
    font-weight: 400;
    color: #f0f6fc;
    font-family: 'SF Mono', 'Fira Code', monospace;
  }
  .agent-meta {
    font-size: 0.65rem;
    font-family: 'SF Mono', 'Fira Code', monospace;
    color: #8b949e;
    white-space: nowrap;
  }
  .agent-branch-arrow { color: #484f58; }
  .meta-icon {
    width: 12px;
    height: 12px;
    vertical-align: -1px;
    margin-right: 3px;
    color: #8b949e;
  }
  .agent-tag {
    font-size: 0.65rem;
    font-weight: 600;
    font-family: 'SF Mono', 'Fira Code', monospace;
    letter-spacing: 0.02em;
    text-transform: uppercase;
    margin-left: auto;
  }
  .agent-tag.feature { color: #58a6ff; }
  .agent-tag.staging { color: #d29922; }
  .agent-tag.production { color: #f85149; }
  .agent-tag.no-deploynope { color: #f85149; animation: pulse 1.5s ease-in-out infinite; }
  .agent-tag.idle { color: #484f58; }
  .agent-tag.active { color: #3fb950; }
  .agent-tag.complete { color: #3fb950; }
  .modified-after-complete {
    font-size: 0.6rem;
    font-weight: 600;
    font-family: 'SF Mono', 'Fira Code', monospace;
    letter-spacing: 0.02em;
    text-transform: uppercase;
    color: #d29922;
    background: rgba(210, 153, 34, 0.1);
    border: 1px solid rgba(210, 153, 34, 0.3);
    padding: 0.1rem 0.4rem;
    margin-top: 0.3rem;
    display: inline-block;
  }

  .drift-badge {
    font-size: 0.6rem;
    font-weight: 400;
    font-family: 'SF Mono', 'Fira Code', monospace;
    letter-spacing: 0.02em;
    text-transform: uppercase;
    margin-left: 0.4rem;
    white-space: nowrap;
  }
  .drift-badge.drift-warn {
    color: #d29922;
  }
  .drift-badge.drift-danger {
    color: #f85149;
  }
  .drift-badge.drift-ahead {
    color: #8b949e;
  }

  /* ── Progress Bar ── */
  .progress-row {
    border: 1px solid #30363d;
    border-radius: 4px;
    padding: 0.5rem;
    margin-top: 0.4rem;
    margin-bottom: 0.4rem;
  }
  .progress-label {
    display: flex;
    justify-content: center;
    font-size: 0.65rem;
    color: #8b949e;
    margin-bottom: 0.3rem;
  }
  .progress-label-split {
    display: flex;
    justify-content: space-between;
    font-size: 0.65rem;
    color: #8b949e;
    margin-bottom: 0.3rem;
  }
  .progress-bar {
    height: 3px;
    background: #21262d;
    border-radius: 2px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    border-radius: 2px;
    background: #58a6ff;
    transition: width 0.5s ease;
  }
  .progress-fill.dev {
    background: #484f58;
  }

  /* ── PR Banner ── */
  .pr-banner {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0.35rem 0.5rem;
    border-radius: 4px;
    font-size: 0.65rem;
    margin-bottom: 0.35rem;
    background: rgba(88, 166, 255, 0.1);
    border: 1px solid rgba(88, 166, 255, 0.3);
    color: #58a6ff;
    text-decoration: none;
    cursor: pointer;
  }
  .pr-banner:hover { border-color: #58a6ff; background: rgba(88, 166, 255, 0.15); }

  /* ── Cleanup Banner ── */
  .cleanup-banner {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0.35rem 0.5rem;
    border-radius: 4px;
    font-size: 0.65rem;
    margin-bottom: 0.35rem;
  }
  .cleanup-banner.safe {
    background: rgba(63, 185, 80, 0.1);
    border: 1px solid rgba(63, 185, 80, 0.3);
    color: #3fb950;
  }
  .cleanup-banner.review {
    background: rgba(210, 153, 34, 0.1);
    border: 1px solid rgba(210, 153, 34, 0.3);
    color: #d29922;
  }
  .cleanup-banner.new {
    background: rgba(88, 166, 255, 0.1);
    border: 1px solid rgba(88, 166, 255, 0.3);
    color: #58a6ff;
  }
  .cleanup-cmd {
    font-family: 'SF Mono', 'Fira Code', monospace;
    font-size: 0.6rem;
    color: #8b949e;
    background: #161b22;
    padding: 0.2rem 0.4rem;
    border-radius: 3px;
    cursor: pointer;
    border: 1px solid #21262d;
    user-select: all;
  }
  .cleanup-cmd:hover {
    border-color: #58a6ff;
    color: #c9d1d9;
  }

  /* ── Gate Banner ── */
  .gate-banner {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    font-size: 0.65rem;
    font-family: 'SF Mono', 'Fira Code', monospace;
    margin-bottom: 0.4rem;
  }
  .gate-banner .gate-text { color: #d29922; font-weight: 500; }

  /* ── Last Action ── */
  .last-action {
    font-size: 0.7rem;
    color: #484f58;
    display: flex;
    align-items: center;
    gap: 0.4rem;
  }
  .last-action code {
    background: #1f2937;
    padding: 0.1rem 0.35rem;
    border-radius: 3px;
    font-family: 'SF Mono', 'Fira Code', monospace;
    font-size: 0.65rem;
    color: #8b949e;
  }

  /* ── Empty State ── */
  .empty-state {
    text-align: center;
    padding: 3rem 1rem;
    color: #484f58;
    font-size: 0.85rem;
  }
  .empty-state .hint {
    margin-top: 0.5rem;
    font-size: 0.75rem;
  }

  /* ── Activity Feed ── */
  .activity-section { position: sticky; top: 1rem; }
  .activity-feed {
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 0;
    padding: 0.75rem;
    max-height: calc(100vh - 200px);
    overflow-y: auto;
  }
  .activity-feed::-webkit-scrollbar { width: 5px; }
  .activity-feed::-webkit-scrollbar-track { background: transparent; }
  .activity-feed::-webkit-scrollbar-thumb { background: #30363d; border-radius: 3px; }

  .activity-item {
    display: flex;
    gap: 0.6rem;
    padding: 0.4rem 0;
    border-bottom: 1px solid #21262d;
  }
  .activity-item:last-child { border-bottom: none; }

  .activity-dot-col {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding-top: 0.15rem;
  }
  .activity-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .activity-dot.blue { background: #58a6ff; }
  .activity-dot.green { background: #3fb950; }
  .activity-dot.yellow { background: #d29922; }
  .activity-dot.red { background: #f85149; }
  .activity-dot.gray { background: #484f58; }
  .activity-line {
    width: 1px;
    flex: 1;
    background: #21262d;
    margin-top: 0.2rem;
  }

  .activity-content { flex: 1; min-width: 0; }
  .activity-action {
    font-size: 0.75rem;
    color: #c9d1d9;
    line-height: 1.3;
  }
  .activity-action strong { color: #58a6ff; font-weight: 600; }
  .activity-meta {
    font-size: 0.65rem;
    color: #484f58;
    margin-top: 0.1rem;
    font-family: 'SF Mono', 'Fira Code', monospace;
  }

  /* ── Remove Button ── */
  .remove-btn {
    background: none;
    border: 1px solid #30363d;
    color: #8b949e;
    font-size: 0.75rem;
    cursor: pointer;
    padding: 0.2rem 0.5rem;
    line-height: 1;
    border-radius: 3px;
    flex-shrink: 0;
    font-family: 'SF Mono', 'Fira Code', monospace;
    opacity: 0;
    transition: opacity 0.15s;
  }
  .agent-card:hover .remove-btn { opacity: 1; }
  .remove-btn:hover { color: #f85149; background: rgba(248, 81, 73, 0.1); border-color: rgba(248, 81, 73, 0.4); }

  /* ── Confirm Modal ── */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.6);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
  }
  .modal {
    background: #161b22;
    border: 1px solid #30363d;
    padding: 1.25rem;
    max-width: 420px;
    width: 90%;
  }
  .modal h3 {
    font-size: 0.85rem;
    color: #f0f6fc;
    margin-bottom: 0.5rem;
  }
  .modal p {
    font-size: 0.75rem;
    color: #8b949e;
    margin-bottom: 0.75rem;
    line-height: 1.4;
  }
  .modal code {
    background: #1f2937;
    padding: 0.1rem 0.35rem;
    border-radius: 3px;
    font-family: 'SF Mono', 'Fira Code', monospace;
    font-size: 0.7rem;
    color: #c9d1d9;
  }
  .modal .warning {
    color: #d29922;
    font-size: 0.7rem;
    margin-bottom: 0.75rem;
    padding: 0.4rem 0.6rem;
    background: rgba(210, 153, 34, 0.1);
    border: 1px solid rgba(210, 153, 34, 0.2);
  }
  .modal-actions {
    display: flex;
    gap: 0.5rem;
    justify-content: flex-end;
  }
  .modal-btn {
    font-size: 0.75rem;
    font-family: 'SF Mono', 'Fira Code', monospace;
    padding: 0.35rem 0.75rem;
    border: 1px solid #30363d;
    background: none;
    color: #c9d1d9;
    cursor: pointer;
  }
  .modal-btn:hover { border-color: #58a6ff; color: #58a6ff; }
  .modal-btn.danger { border-color: rgba(248, 81, 73, 0.4); color: #f85149; }
  .modal-btn.danger:hover { background: rgba(248, 81, 73, 0.1); border-color: #f85149; }

  @media (max-width: 900px) {
    .main-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header class="header">
  <h1>Deploy<span>NOPE</span></h1>
  <div class="header-status">
    <button id="scan-btn" onclick="runScan()" title="Scan repos and worktrees to populate dashboard" style="
      background: #21262d; border: 1px solid #30363d; color: #c9d1d9; padding: 0.3rem 0.7rem;
      border-radius: 4px; font-size: 0.75rem; cursor: pointer; margin-right: 0.5rem;
    ">Scan</button>
    <div class="status-dot" id="connection-dot"></div>
    <span id="header-summary">Connecting...</span>
  </div>
</header>

<div class="container">
  <div id="warnings-container"></div>
  <div id="staging-container"></div>

  <div class="main-grid">
    <div class="agents-section">
      <div id="agents-container">
        <div class="empty-state">
          <div>No agents detected yet</div>
          <div class="hint">Start a Claude Code session — hooks will register it automatically</div>
        </div>
      </div>
    </div>

    <div class="activity-section">
      <h2>Activity</h2>
      <div class="activity-feed" id="activity-container">
        <div class="empty-state">
          <div>No activity yet</div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
function runScan() {
  const btn = document.getElementById('scan-btn');
  btn.disabled = true;
  btn.textContent = 'Scanning...';
  btn.style.opacity = '0.6';
  fetch('/api/scan', { method: 'POST' })
    .then(r => r.json())
    .then(data => {
      btn.textContent = data.ok ? 'Done!' : 'Error';
      setTimeout(() => { btn.textContent = 'Scan'; btn.disabled = false; btn.style.opacity = '1'; }, 2000);
    })
    .catch(() => {
      btn.textContent = 'Error';
      setTimeout(() => { btn.textContent = 'Scan'; btn.disabled = false; btn.style.opacity = '1'; }, 2000);
    });
}

(function() {
  let connected = false;

  function timeAgo(ts) {
    const diff = Date.now() - new Date(ts).getTime();
    const seconds = Math.floor(diff / 1000);
    if (seconds < 60) return seconds + 's ago';
    const minutes = Math.floor(seconds / 60);
    if (minutes < 60) return minutes + 'm ago';
    const hours = Math.floor(minutes / 60);
    return hours + 'h ago';
  }

  function shortCommand(cmd) {
    // Trim long commands — show the git/gh part only
    const match = cmd.match(/(git\s+\S+(?:\s+\S+)?|gh\s+\S+\s+\S+)/);
    if (match) return match[1];
    if (cmd.length > 60) return cmd.substring(0, 57) + '...';
    return cmd;
  }

  function inferStage(agent) {
    // Use explicit DeployNOPE stage if available
    const dn = agent.deploynope || {};
    if (dn.active && dn.stage) {
      const s = dn.stage.toLowerCase();
      if (s.includes('production')) return 'production';
      if (s.includes('staging')) return 'staging';
      if (s.includes('release')) return 'production';
      if (s.includes('rollback')) return 'production';
      return 'feature';
    }

    const branch = agent.branch || '';
    const target = agent.target || '';
    const config = agent.config || {};

    if (target === config.prodBranch || target === 'main' || target === 'master') return 'production';
    if (target === config.stagingBranch || target === 'staging') return 'staging';
    if (branch === config.stagingBranch || branch === 'staging') return 'staging';
    return 'feature';
  }

  function stageLabel(agent) {
    const dn = agent.deploynope || {};
    if (dn.active && dn.stage) return dn.stage.toUpperCase();
    return inferStage(agent).toUpperCase();
  }

  function inferName(agent) {
    const branch = agent.branch || agent.id;
    // Version-like branches are releases
    if (/^\d+\.\d+/.test(branch)) return 'Release ' + branch;
    // Feature branches
    if (branch.startsWith('feature/')) return branch.replace('feature/', '').replace(/-/g, ' ');
    if (branch.startsWith('hotfix/')) return branch.replace('hotfix/', '').replace(/-/g, ' ') + ' hotfix';
    if (branch.startsWith('bugfix/')) return branch.replace('bugfix/', '').replace(/-/g, ' ') + ' bugfix';
    return branch;
  }

  function activityDotColor(entry) {
    if (entry.decision === 'deny') return 'red';
    if (entry.action === 'git-reset' || entry.action === 'gh-api-protection') return 'yellow';
    if (entry.action === 'git-commit') return 'green';
    return 'blue';
  }

  function actionLabel(entry) {
    const labels = {
      'git-commit': 'committed',
      'git-push': 'pushed',
      'git-reset': 'reset',
      'git-merge': 'merged',
      'git-tag': 'tagged',
      'git-branch-delete': 'deleted branch',
      'gh-pr': 'created PR',
      'gh-release': 'created release',
      'gh-api-protection': 'modified protection',
    };
    return labels[entry.action] || entry.action;
  }

  function render(state) {
    // Deduplicate agents by cwd — prefer hook-registered over scanned,
    // then prefer the most advanced active pipeline stage, then most recent.
    var stageRank = {
      'new work': 1, 'configure': 2, 'verify rules': 3, 'feature': 4,
      'changelog': 5, 'preflight': 6, 'stale check': 7, 'deploy status': 8,
      'staging contention': 9, 'staging claim': 10, 'staging reset': 11,
      'staging validation': 12, 'production': 13, 'release': 14,
      'release manifest': 15, 'post-deploy': 16, 'reconcile': 17, 'complete': 18
    };
    function agentStageRank(agent) {
      var dn = agent.deploynope || {};
      if (!dn.active || !dn.stage) return 0;
      return stageRank[dn.stage.toLowerCase()] || 0;
    }
    var rawAgents = Object.values(state.agents || {});
    var byCwd = {};
    rawAgents.forEach(function(a) {
      var key = a.cwd || a.id;
      var existing = byCwd[key];
      if (!existing) {
        byCwd[key] = a;
      } else {
        // Prefer non-scanned (hook-registered) over scanned
        var aIsHook = !a.scanned;
        var existingIsHook = !existing.scanned;
        if (aIsHook && !existingIsHook) {
          byCwd[key] = a;
        } else if (aIsHook === existingIsHook) {
          // Same type — prefer the most advanced active pipeline stage
          var aRank = agentStageRank(a);
          var existingRank = agentStageRank(existing);
          if (aRank > existingRank && aRank < 18) {
            // More advanced and not Complete — prefer it
            byCwd[key] = a;
          } else if (aRank === existingRank) {
            // Same stage rank — prefer most recently seen
            if (new Date(a.lastSeenAt) > new Date(existing.lastSeenAt)) {
              byCwd[key] = a;
            }
          }
          // If existing is more advanced (and not Complete), keep it
        }
      }
    });
    const agents = Object.values(byCwd);
    const activity = state.activity || [];

    // Sort: active first, stale last
    agents.sort((a, b) => {
      if (a.stale && !b.stale) return 1;
      if (!a.stale && b.stale) return -1;
      return new Date(b.lastSeenAt) - new Date(a.lastSeenAt);
    });

    // Header summary
    const activeCount = agents.filter(a => !a.stale).length;
    const gateCount = agents.filter(a => !a.stale && (a.deploynope || {}).gate && a.deploynope.gate.waiting).length;
    const warningCount = gateCount;
    const dot = document.getElementById('connection-dot');
    dot.className = 'status-dot' + (warningCount > 0 ? ' warning' : '');
    document.getElementById('header-summary').textContent =
      (gateCount > 0 ? gateCount + ' gate' + (gateCount > 1 ? 's' : '') + ' waiting \u00b7 ' : '') +
      activeCount + ' agent' + (activeCount !== 1 ? 's' : '');

    // Build a set of repos that have staging claimed (per-repo staging lock)
    const stagingByRepo = {};
    agents.forEach(a => {
      if (a.stale) return;
      const t = a.target || '';
      const b = a.branch || '';
      const sb = (a.config || {}).stagingBranch || 'staging';
      if (t === sb || b === sb) {
        stagingByRepo[a.repo] = a.id;
      }
    });
    // Separate staging, development, and work agents
    var stagingAgents = [];
    var devAgents = [];
    var workAgents = [];
    agents.forEach(function(a) {
      var cfg = a.config || {};
      var sb = cfg.stagingBranch || 'staging';
      var db = cfg.devBranch || 'development';
      var pb = cfg.prodBranch || 'main';
      if (a.branch === sb) {
        stagingAgents.push(a);
      } else if (a.branch === db) {
        devAgents.push(a);
      } else if (a.branch === pb || a.branch === 'main' || a.branch === 'master') {
        // Production branches are infrastructure — don't show as work agent cards
      } else {
        workAgents.push(a);
      }
    });

    // Index staging and development agents by repo for per-group rendering
    var stagingByRepoAgent = {};
    stagingAgents.forEach(function(a) {
      stagingByRepoAgent[a.repo || 'Unknown'] = a;
    });
    var devByRepoAgent = {};
    devAgents.forEach(function(a) {
      devByRepoAgent[a.repo || 'Unknown'] = a;
    });

    // Clear the top-level staging container (staging is now per-repo)
    document.getElementById('staging-container').innerHTML = '';

    function renderStagingBar(stagingAgent, repoWorkAgents) {
      // Find the agent that is currently deploying through staging
      // Look for a work agent whose deploynope stage is Staging, Staging Validation, or Production
      var claimingAgent = null;
      if (repoWorkAgents) {
        for (var i = 0; i < repoWorkAgents.length; i++) {
          var wa = repoWorkAgents[i];
          var wdn = wa.deploynope || {};
          if (wdn.active && wdn.stage) {
            var ws = wdn.stage.toLowerCase();
            if (ws.indexOf('staging') !== -1 || ws === 'production' || ws === 'release' || ws === 'release manifest' || ws === 'post-deploy') {
              claimingAgent = wa;
              break;
            }
          }
        }
      }

      // Also check the staging agent itself for deploynope data (from the stage hook)
      var dn = (stagingAgent ? stagingAgent.deploynope : null) || {};
      var gate = dn.gate;
      var gateWaiting = gate && gate.waiting;

      var isClaimed = (dn.active && dn.stage) || gateWaiting || claimingAgent;

      if (!isClaimed) {
        return '<div class="staging-bar free">' +
          '<span class="staging-label">staging</span>' +
          '<span class="staging-status free">Available</span>' +
          '</div>';
      }

      // Determine context and stage from the claiming agent or staging's own deploynope data
      var currentStage = null;
      var context = '';
      if (claimingAgent) {
        var cdn = claimingAgent.deploynope || {};
        currentStage = cdn.stage || null;
        context = cdn.context || claimingAgent.version || inferName(claimingAgent);
        // Use claiming agent's gate if staging doesn't have one
        if (!gateWaiting && cdn.gate && cdn.gate.waiting) {
          gate = cdn.gate;
          gateWaiting = true;
        }
      }
      if (!currentStage && dn.active && dn.stage) {
        currentStage = dn.stage;
        context = context || dn.context || '';
      }
      if (!currentStage) {
        currentStage = 'Staging Validation';
      }
      if (!context) {
        context = (stagingAgent ? stagingAgent.version : '') || '';
      }

      var statusText = context ? context + ' on staging' : 'Claimed';

      var html = '<div class="staging-bar claimed">';
      html += '<span class="staging-label">staging</span>';
      html += '<span class="staging-status claimed">' + escapeHtml(statusText) + '</span>';

      // Timeline
      var stageOrder = [
        'New Work', 'Configure', 'Verify Rules', 'Feature',
        'Changelog', 'Preflight', 'Stale Check', 'Deploy Status',
        'Staging Contention', 'Staging Claim', 'Staging Reset', 'Staging Validation',
        'Production', 'Release', 'Release Manifest',
        'Post-Deploy', 'Reconcile', 'Complete'
      ];
      var nonLinearStages = { 'rollback': true, 'deploy': true };
      var stepIndex = -1;
      if (nonLinearStages[currentStage.toLowerCase()]) {
        stepIndex = -1;
      } else {
        for (var si = 0; si < stageOrder.length; si++) {
          if (stageOrder[si].toLowerCase() === currentStage.toLowerCase()) { stepIndex = si; break; }
        }
        if (stepIndex === -1) {
          for (var si = 0; si < stageOrder.length; si++) {
            if (currentStage.toLowerCase().indexOf(stageOrder[si].toLowerCase()) !== -1 ||
                stageOrder[si].toLowerCase().indexOf(currentStage.toLowerCase()) !== -1) { stepIndex = si; break; }
          }
        }
      }
      if (stepIndex >= 0) {
        var stepNum = stepIndex + 1;
        var pct = Math.round((stepNum / stageOrder.length) * 100);
        html += '<span style="flex:1;display:flex;align-items:center;gap:0.5rem;">';
        html += '<span style="font-size:0.65rem;color:#8b949e;white-space:nowrap;">Step ' + stepNum + '/' + stageOrder.length + ' &middot; ' + escapeHtml(currentStage) + '</span>';
        html += '<span style="flex:1;height:3px;background:#21262d;border-radius:2px;overflow:hidden;">';
        html += '<span style="display:block;height:100%;width:' + pct + '%;background:#58a6ff;border-radius:2px;transition:width 0.5s ease;"></span>';
        html += '</span>';
        html += '<span style="font-size:0.65rem;color:#8b949e;">' + pct + '%</span>';
        html += '</span>';
      }

      // Gate
      if (gateWaiting) {
        html += '<span style="font-size:0.65rem;color:#d29922;white-space:nowrap;">' + escapeHtml(gate.label || 'Sign-off required') + '</span>';
        if (gate.since) {
          html += '<span style="font-size:0.6rem;color:#8b949e;">' + timeAgo(gate.since) + '</span>';
        }
      }

      html += '</div>';
      return html;
    }

    function renderDevBar(devAgent) {
      if (!devAgent) return '';

      var dn = devAgent.deploynope || {};
      var drift = dn.drift || {};
      var driftInfo = '';
      if (drift.behindBy && drift.behindBy > 0) {
        var driftClass = drift.behindBy > 10 ? 'drift-danger' : 'drift-warn';
        driftInfo = '<span class="drift-badge ' + driftClass + '">' +
          '\u26A0 ' + drift.behindBy + ' behind ' + escapeHtml(drift.baseBranch || 'main') + '</span>';
      }

      var lastActivity = '';
      if (devAgent.lastAction && devAgent.lastAction.timestamp) {
        lastActivity = ' &middot; ' + timeAgo(devAgent.lastAction.timestamp);
      }

      var html = '<div class="staging-bar free" style="border-color:#30363d;">';
      html += '<span class="staging-label" style="color:#8b949e;">development</span>';
      html += '<span class="staging-status free" style="color:#8b949e;">' +
        escapeHtml(devAgent.version || '') + lastActivity + '</span>';
      html += driftInfo;
      html += '</div>';
      return html;
    }

    // Agents — grouped by repo (excluding staging and development)
    var displayAgents = workAgents;
    const agentsContainer = document.getElementById('agents-container');
    if (displayAgents.length === 0 && stagingAgents.length === 0) {
      agentsContainer.innerHTML =
        '<div class="agents-section"><div class="agents-header"><h2>Agents</h2>' +
        '</div>' +
        '<div class="empty-state">' +
        '<div>No agents detected yet</div>' +
        '<div class="hint">Start a Claude Code session \u2014 hooks will register it automatically</div>' +
        '</div></div>';
    } else {
      // Group agents by repo
      var repoGroups = {};
      displayAgents.forEach(function(agent) {
        var repo = agent.repo || 'Unknown';
        if (!repoGroups[repo]) repoGroups[repo] = [];
        repoGroups[repo].push(agent);
      });

      function renderCard(agent) {
        const stage = inferStage(agent);
        const name = inferName(agent);
        const target = agent.target || '';
        const gate = (agent.deploynope || {}).gate;
        const gateWaiting = gate && gate.waiting;
        const hasGate = (agent.deploynope || {}).gate && agent.deploynope.gate.waiting;
        const treatAsStale = agent.stale && !hasGate;
        const staleClass = treatAsStale ? ' stale' : '';
        const tagClass = treatAsStale ? 'idle' : stage;
        const tagText = treatAsStale ? 'STALE' : stageLabel(agent);

        const isStaging = agent.repo && stagingByRepo.hasOwnProperty(agent.repo) && stagingByRepo[agent.repo] === agent.id;
        const lockIcon = isStaging ? '\uD83D\uDD12 ' : '';

        var branchIcon = '<svg class="meta-icon" viewBox="0 0 16 16" fill="currentColor"><path d="M11.75 2.5a.75.75 0 100 1.5.75.75 0 000-1.5zm-2.25.75a2.25 2.25 0 113 2.122V6A2.5 2.5 0 0110 8.5H6a1 1 0 00-1 1v1.128a2.251 2.251 0 11-1.5 0V5.372a2.25 2.25 0 111.5 0v1.836A2.492 2.492 0 016 7h4a1 1 0 001-1v-.628A2.25 2.25 0 019.5 3.25zM4.25 12a.75.75 0 100 1.5.75.75 0 000-1.5zM3.5 3.25a.75.75 0 111.5 0 .75.75 0 01-1.5 0z"/></svg>';

        var dn = agent.deploynope || {};
        var drift = dn.drift || {};
        var driftBadge = '';
        if (drift.aheadBy && drift.aheadBy > 0) {
          driftBadge += '<span class="drift-badge drift-ahead">' +
            drift.aheadBy + ' ahead</span>';
        }
        if (drift.behindBy && drift.behindBy > 0) {
          var driftClass = drift.behindBy > 10 ? 'drift-danger' : 'drift-warn';
          driftBadge += '<span class="drift-badge ' + driftClass + '">' +
            '\u26A0 ' + drift.behindBy + ' behind</span>';
        }

        let inner = '<div class="agent-header">';
        inner += '<span class="agent-name">' + escapeHtml(name) + '</span>';
        inner += driftBadge;
        inner += '<span class="agent-tag ' + tagClass + '">' + lockIcon + tagText + '</span>';
        inner += '<button class="remove-btn" data-agent-id="' + escapeHtml(agent.id) + '" data-agent-name="' + escapeHtml(name) + '" data-agent-cwd="' + escapeHtml(agent.cwd || '') + '" title="Remove">&times;</button>';
        inner += '</div>';

        inner += '<div class="agent-meta-row">';
        if (agent.branch && target && target !== agent.branch) {
          inner += '<span class="agent-meta">' + branchIcon + escapeHtml(agent.branch) + ' <span class="agent-branch-arrow">&rarr;</span> ' + escapeHtml(target) + '</span>';
        } else if (agent.branch) {
          inner += '<span class="agent-meta">' + branchIcon + escapeHtml(agent.branch) + '</span>';
        }
        var prodBranch = (agent.config || {}).prodBranch || 'main';
        var onProd = (agent.branch === prodBranch || agent.branch === 'main' || agent.branch === 'master');
        if (onProd && stage !== 'production') {
          inner += '<span class="agent-meta" style="color:#f85149;">checked out on ' + escapeHtml(agent.branch) + '</span>';
        }
        inner += '</div>';

        // Modified-after-complete warning
        if (dn.modifiedAfterComplete) {
          inner += '<div class="modified-after-complete">Modified after complete</div>';
        }

        // Progress bar
        var stageOrder = [
          'New Work', 'Configure', 'Verify Rules', 'Feature',
          'Changelog', 'Preflight', 'Stale Check', 'Deploy Status',
          'Staging Contention', 'Staging Claim', 'Staging Reset', 'Staging Validation',
          'Production', 'Release', 'Release Manifest',
          'Post-Deploy', 'Reconcile', 'Complete'
        ];
        var stageDescriptions = {
          'new work': 'Setting up new branch',
          'configure': 'Configuring DeployNOPE',
          'verify rules': 'Verifying deployment rules',
          'feature': 'Working on feature branch',
          'changelog': 'Updating changelog',
          'preflight': 'Running pre-flight checks',
          'stale check': 'Checking for stale work',
          'deploy status': 'Reviewing deployment status',
          'staging contention': 'Checking staging availability',
          'staging claim': 'Claiming staging branch',
          'staging reset': 'Resetting staging branch',
          'staging validation': 'Validating on staging',
          'production': 'Deploying to production',
          'release': 'Creating GitHub Release',
          'release manifest': 'Writing release manifest',
          'post-deploy': 'Running post-deploy checks',
          'reconcile': 'Reconciling branches',
          'complete': 'Deployment complete'
        };
        var totalSteps = stageOrder.length;
        var nonLinearStages = { 'rollback': true, 'deploy': true };
        var isDeploynope = dn.active && dn.stage;

        if (isDeploynope) {
          // Active DeployNOPE — show real pipeline progress
          var currentStage = dn.stage;
          var stepIndex = -1;
          if (!nonLinearStages[currentStage.toLowerCase()]) {
            for (var si = 0; si < stageOrder.length; si++) {
              if (stageOrder[si].toLowerCase() === currentStage.toLowerCase()) {
                stepIndex = si;
                break;
              }
            }
            if (stepIndex === -1) {
              for (var si = 0; si < stageOrder.length; si++) {
                if (currentStage.toLowerCase().indexOf(stageOrder[si].toLowerCase()) !== -1 ||
                    stageOrder[si].toLowerCase().indexOf(currentStage.toLowerCase()) !== -1) {
                  stepIndex = si;
                  break;
                }
              }
            }
          }
          if (stepIndex >= 0) {
            var stepNum = stepIndex + 1;
            var pct = Math.round((stepNum / totalSteps) * 100);
            var desc = stageDescriptions[currentStage.toLowerCase()] || currentStage;
            inner += '<div class="progress-row">';
            inner += '<div class="progress-label-split">';
            inner += '<span>Step ' + stepNum + '/' + totalSteps + ' &middot; ' + escapeHtml(desc) + '</span>';
            inner += '<span>' + pct + '%</span>';
            inner += '</div>';
            inner += '<div class="progress-bar">';
            inner += '<div class="progress-fill" style="width: ' + pct + '%"></div>';
            inner += '</div>';
            inner += '</div>';
          }
        } else {
          // No active DeployNOPE — show "In development" at the Feature stage
          var devPct = Math.round((4 / totalSteps) * 100);
          inner += '<div class="progress-row">';
          inner += '<div class="progress-label">';
          inner += '<span>In development</span>';
          inner += '</div>';
          inner += '<div class="progress-bar">';
          inner += '<div class="progress-fill dev" style="width: ' + devPct + '%"></div>';
          inner += '</div>';
          inner += '</div>';
        }

        // PR banner
        var pr = agent.pr;
        if (pr && pr.url && !pr.merged) {
          inner += '<a class="pr-banner" href="' + escapeHtml(pr.url) + '" target="_blank">';
          inner += '<span>PR #' + pr.number + ' awaiting merge</span>';
          inner += '</a>';
        }

        // Cleanup banner
        var cleanup = agent.cleanup;
        if (cleanup && (cleanup.status === 'safe' || cleanup.status === 'review' || cleanup.status === 'new')) {
          var cleanupLabel = cleanup.status === 'safe' ? 'Safe to delete' : cleanup.status === 'new' ? 'New work' : 'Review before deleting';
          inner += '<div class="cleanup-banner ' + cleanup.status + '">';
          if (cleanup.status === 'new') {
            inner += '<span>' + cleanupLabel + '</span>';
          } else {
            inner += '<span>' + cleanupLabel + ' &middot; ' + escapeHtml(cleanup.reason) + '</span>';
            if (cleanup.command) {
              inner += '<code class="cleanup-cmd" title="Click to select">' + escapeHtml(cleanup.command) + '</code>';
            }
          }
          inner += '</div>';
        }

        // Gate banner
        if (gateWaiting) {
          inner += '<div class="gate-banner">' +
            '<span class="gate-text">' + escapeHtml(gate.label || 'Waiting for sign-off') + '</span>' +
            (gate.since ? '<span style="margin-left:auto;font-size:0.6rem;color:#8b949e;">' + timeAgo(gate.since) + '</span>' : '') +
            '</div>';
        }

        // Last action
        if (agent.lastAction) {
          inner += '<div class="last-action"><code>' + escapeHtml(shortCommand(agent.lastAction.command || '')) + '</code> ' + timeAgo(agent.lastAction.timestamp) + '</div>';
        }

        return '<div class="agent-card' + staleClass + '">' + inner + '</div>';
      }

      // Collect all repos (including those with only a staging agent)
      var allRepos = {};
      Object.keys(repoGroups).forEach(function(r) { allRepos[r] = true; });
      Object.keys(stagingByRepoAgent).forEach(function(r) { allRepos[r] = true; });
      Object.keys(devByRepoAgent).forEach(function(r) { allRepos[r] = true; });

      // Render each repo group with header, staging bar, then cards
      var html = '';
      Object.keys(allRepos).forEach(function(repo) {
        var repoName = repo.indexOf('/') !== -1 ? repo.split('/').pop() : repo;
        html += '<div class="agents-section">';
        html += '<div class="agents-header">';
        html += '<h2>' + escapeHtml(repoName) + '</h2>';
        html += '</div>';
        html += renderStagingBar(stagingByRepoAgent[repo] || null, repoGroups[repo] || []);
        html += renderDevBar(devByRepoAgent[repo] || null);
        var cards = repoGroups[repo] || [];
        if (cards.length > 0) {
          html += '<div class="agent-cards">';
          html += cards.map(renderCard).join('');
          html += '</div>';
        }
        html += '</div>';
      });
      agentsContainer.innerHTML = html;
    }

    // Activity feed
    const activityContainer = document.getElementById('activity-container');
    if (activity.length === 0) {
      activityContainer.innerHTML = '<div class="empty-state"><div>No activity yet</div></div>';
    } else {
      activityContainer.innerHTML = activity.slice(0, 30).map((entry, i) => {
        const dotColor = activityDotColor(entry);
        const isLast = i === Math.min(activity.length, 30) - 1;
        return '<div class="activity-item">' +
          '<div class="activity-dot-col">' +
          '<div class="activity-dot ' + dotColor + '"></div>' +
          (isLast ? '' : '<div class="activity-line"></div>') +
          '</div>' +
          '<div class="activity-content">' +
          '<div class="activity-action"><strong>' + escapeHtml(inferName(entry)) + '</strong> ' + actionLabel(entry) + '</div>' +
          '<div class="activity-meta">' + timeAgo(entry.timestamp) + ' \u00b7 ' + escapeHtml(entry.repo || '') + ' \u00b7 ' + escapeHtml(entry.branch || '') + '</div>' +
          '</div></div>';
      }).join('');
    }
  }

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  // SSE connection
  function connect() {
    const es = new EventSource('/api/events');

    es.onopen = function() {
      connected = true;
      document.getElementById('connection-dot').classList.remove('disconnected');
    };

    es.onmessage = function(event) {
      try {
        const state = JSON.parse(event.data);
        render(state);
      } catch (e) {
        console.error('Failed to parse state:', e);
      }
    };

    es.onerror = function() {
      connected = false;
      document.getElementById('connection-dot').classList.add('disconnected');
      document.getElementById('header-summary').textContent = 'Disconnected';
      es.close();
      // Reconnect after 3 seconds
      setTimeout(connect, 3000);
    };
  }

  connect();

  // Update time-ago values every 30 seconds
  setInterval(function() {
    // Re-render with cached state would be ideal, but the SSE will push updates anyway
  }, 30000);

  // Remove agent — click handler on cards
  document.addEventListener('click', function(e) {
    var btn = e.target.closest('.remove-btn');
    if (!btn) return;

    var agentId = btn.getAttribute('data-agent-id');
    var agentName = btn.getAttribute('data-agent-name');
    var agentCwd = btn.getAttribute('data-agent-cwd');

    showRemoveModal(agentId, agentName, agentCwd);
  });

  function showRemoveModal(agentId, agentName, agentCwd) {
    var existing = document.querySelector('.modal-overlay');
    if (existing) existing.remove();

    var overlay = document.createElement('div');
    overlay.className = 'modal-overlay';

    var isWorktreePath = agentCwd && (agentCwd.includes('/worktrees/') || agentCwd.includes('.claude/worktrees/'));

    var html = '<div class="modal">';
    html += '<h3>Remove ' + escapeHtml(agentName) + '</h3>';

    if (isWorktreePath) {
      html += '<p>This entry points to a git worktree at:<br><code>' + escapeHtml(agentCwd) + '</code></p>';
      html += '<div class="modal-actions">';
      html += '<button class="modal-btn" data-action="cancel">Cancel</button>';
      html += '<button class="modal-btn" data-action="entry-only">Dashboard only</button>';
      html += '<button class="modal-btn danger" data-action="remove-worktree">Remove worktree</button>';
      html += '</div>';
    } else {
      html += '<p>Remove this entry from the dashboard?</p>';
      if (agentCwd) {
        html += '<p>Path: <code>' + escapeHtml(agentCwd) + '</code><br>The repo will not be touched.</p>';
      }
      html += '<div class="modal-actions">';
      html += '<button class="modal-btn" data-action="cancel">Cancel</button>';
      html += '<button class="modal-btn danger" data-action="entry-only">Remove</button>';
      html += '</div>';
    }

    html += '</div>';
    overlay.innerHTML = html;
    document.body.appendChild(overlay);

    overlay.addEventListener('click', function(e) {
      var action = e.target.getAttribute('data-action');
      if (!action) {
        if (e.target === overlay) overlay.remove();
        return;
      }
      if (action === 'cancel') { overlay.remove(); return; }

      var removeWorktree = action === 'remove-worktree';
      doRemove(agentId, removeWorktree, overlay);
    });
  }

  function doRemove(agentId, removeWorktree, overlay) {
    var url = '/api/agents/' + encodeURIComponent(agentId);
    if (removeWorktree) url += '?removeWorktree=true';

    fetch(url, { method: 'DELETE' })
      .then(function(res) { return res.json().then(function(data) { return { status: res.status, data: data }; }); })
      .then(function(result) {
        if (result.status === 409 && result.data.dirty) {
          showDirtyWarning(agentId, result.data.status, overlay);
          return;
        }
        if (!result.data.ok) {
          alert('Failed to remove: ' + (result.data.error || 'Unknown error'));
          overlay.remove();
          return;
        }
        overlay.remove();
      })
      .catch(function(err) {
        alert('Error: ' + err.message);
        overlay.remove();
      });
  }

  function showDirtyWarning(agentId, statusOutput, overlay) {
    var modal = overlay.querySelector('.modal');
    modal.innerHTML =
      '<h3>Worktree has uncommitted changes</h3>' +
      '<div class="warning">The following changes would be lost:<br><code>' + escapeHtml(statusOutput) + '</code></div>' +
      '<div class="modal-actions">' +
      '<button class="modal-btn" data-action="cancel">Cancel</button>' +
      '<button class="modal-btn" data-action="entry-only">Dashboard only</button>' +
      '<button class="modal-btn danger" data-action="force-remove">Remove anyway</button>' +
      '</div>';

    modal.addEventListener('click', function(e) {
      var action = e.target.getAttribute('data-action');
      if (!action) return;
      if (action === 'cancel') { overlay.remove(); return; }
      if (action === 'entry-only') {
        fetch('/api/agents/' + encodeURIComponent(agentId), { method: 'DELETE' })
          .then(function() { overlay.remove(); })
          .catch(function() { overlay.remove(); });
        return;
      }
      if (action === 'force-remove') {
        fetch('/api/agents/' + encodeURIComponent(agentId) + '?removeWorktree=true&force=true', { method: 'DELETE' })
          .then(function() { overlay.remove(); })
          .catch(function(err) { alert('Error: ' + err.message); overlay.remove(); });
      }
    });
  }
})();
</script>
